<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Racing Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            border: 3px solid #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        #score {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }
        #gameOver {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }
        #gameOver h1 {
            color: #ff4444;
            font-size: 56px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255,0,0,0.5);
        }
        #gameOver p {
            color: #fff;
            font-size: 24px;
            margin-bottom: 30px;
        }
        #gameOver button {
            padding: 12px 40px;
            margin: 8px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        #restartBtn {
            background: #44ff44;
            color: #000;
        }
        #restartBtn:hover {
            background: #33dd33;
            transform: scale(1.05);
        }
        #quitBtn {
            background: #ff4444;
            color: #fff;
        }
        #quitBtn:hover {
            background: #dd3333;
            transform: scale(1.05);
        }
        #controls {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 14px;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="score">Score: 0</div>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="gameOver">
            <h1>GAME OVER</h1>
            <p id="finalScore">Score: 0</p>
            <button id="restartBtn">Restart (R)</button>
            <button id="quitBtn">Quit</button>
        </div>
        <div id="controls">← → or A/D to move | Avoid red cars!</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');
        const quitBtn = document.getElementById('quitBtn');

        let gameRunning = true;
        let score = 0;
        let enemySpawnTimer = 0;
        let enemySpawnDelay = 60;
        let animationId;

        const player = {
            x: 180, y: 510, width: 40, height: 70,
            speed: 5, color: '#0066ff'
        };

        let enemies = [];
        let roadLines = [];

        for (let i = 0; i < canvas.height; i += 80) {
            roadLines.push({ x: 195, y: i, width: 10, height: 40, speed: 5 });
        }

        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key.toLowerCase() === 'r' && !gameRunning) restartGame();
        });
        document.addEventListener('keyup', (e) => keys[e.key] = false);

        function drawRoad() {
            ctx.fillStyle = '#228b22';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#333';
            ctx.fillRect(50, 0, 300, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.fillRect(50, 0, 5, canvas.height);
            ctx.fillRect(345, 0, 5, canvas.height);
        }

        function drawCar(x, y, w, h, color, isEnemy) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
            ctx.fillStyle = '#000';
            if (isEnemy) {
                ctx.fillRect(x + 5, y + 30, w - 10, 20);
                ctx.fillStyle = '#ff0';
                ctx.beginPath();
                ctx.arc(x + 8, y + h - 5, 4, 0, Math.PI * 2);
                ctx.arc(x + w - 8, y + h - 5, 4, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.fillRect(x + 5, y + 10, w - 10, 20);
            }
            ctx.fillStyle = '#000';
            const wy1 = isEnemy ? y + h - 15 : y + 5;
            const wy2 = isEnemy ? y + h - 15 : y + h - 15;
            ctx.beginPath();
            ctx.arc(x + 8, wy1, 5, 0, Math.PI * 2);
            ctx.arc(x + w - 8, wy1, 5, 0, Math.PI * 2);
            ctx.arc(x + 8, wy2, 5, 0, Math.PI * 2);
            ctx.arc(x + w - 8, wy2, 5, 0, Math.PI * 2);
            ctx.fill();
        }

        function spawnEnemy() {
            const lanes = [80, 140, 200, 260];
            enemies.push({
                x: lanes[Math.floor(Math.random() * lanes.length)],
                y: -70, width: 40, height: 70,
                speed: 3 + Math.floor(score / 100),
                color: '#cc0000'
            });
        }

        function checkCollision(a, b) {
            return a.x < b.x + b.width && a.x + a.width > b.x &&
                   a.y < b.y + b.height && a.y + a.height > b.y;
        }

        function update() {
            if (!gameRunning) return;
            if ((keys['ArrowLeft'] || keys['a'] || keys['A']) && player.x > 60) player.x -= player.speed;
            if ((keys['ArrowRight'] || keys['d'] || keys['D']) && player.x < 300) player.x += player.speed;

            roadLines.forEach(line => {
                line.y += line.speed;
                if (line.y > canvas.height) line.y = -40;
            });

            enemySpawnTimer++;
            if (enemySpawnTimer >= enemySpawnDelay) {
                spawnEnemy();
                enemySpawnTimer = 0;
                if (enemySpawnDelay > 20) enemySpawnDelay--;
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].y += enemies[i].speed;
                if (checkCollision(player, enemies[i])) { gameOver(); return; }
                if (enemies[i].y > canvas.height) {
                    enemies.splice(i, 1);
                    score += 10;
                    scoreDisplay.textContent = `Score: ${score}`;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawRoad();
            ctx.fillStyle = '#fff';
            roadLines.forEach(l => ctx.fillRect(l.x, l.y, l.width, l.height));
            enemies.forEach(e => drawCar(e.x, e.y, e.width, e.height, e.color, true));
            drawCar(player.x, player.y, player.width, player.height, player.color, false);
        }

        function gameOver() {
            gameRunning = false;
            finalScoreDisplay.textContent = `Final Score: ${score}`;
            gameOverScreen.style.display = 'flex';
        }

        function restartGame() {
            gameRunning = true;
            score = 0;
            enemySpawnTimer = 0;
            enemySpawnDelay = 60;
            enemies = [];
            player.x = 180;
            scoreDisplay.textContent = 'Score: 0';
            gameOverScreen.style.display = 'none';
        }

        function gameLoop() {
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        restartBtn.addEventListener('click', restartGame);
        quitBtn.addEventListener('click', () => location.reload());

        gameLoop();
    </script>
</body>
</html>
