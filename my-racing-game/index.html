<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Racing Game</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 3px solid #fff;
        }
        #score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 24px;
            font-weight: bold;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            display: none;
        }
        #gameOver h1 {
            color: #ff4444;
            font-size: 48px;
            margin: 0;
        }
        #gameOver p {
            font-size: 20px;
        }
        #gameOver button {
            padding: 10px 30px;
            font-size: 18px;
            background: #44ff44;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        #gameOver button:hover {
            background: #33dd33;
        }
    </style>
</head>
<body>
    <div id="score">Score: 0</div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div id="gameOver">
        <h1>GAME OVER</h1>
        <p id="finalScore">Score: 0</p>
        <button onclick="restartGame()">Restart (R)</button>
        <button onclick="location.reload()">Quit</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');

        // Game variables
        let gameRunning = true;
        let score = 0;
        let enemySpawnTimer = 0;
        let enemySpawnDelay = 60;

        // Player car
        const player = {
            x: 180,
            y: 510,
            width: 40,
            height: 70,
            speed: 5,
            color: '#0066ff'
        };

        // Arrays
        let enemies = [];
        let roadLines = [];

        // Initialize road lines
        for (let i = 0; i < canvas.height; i += 80) {
            roadLines.push({ x: 195, y: i, width: 10, height: 40, speed: 5 });
        }

        // Input handling
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key.toLowerCase() === 'r' && !gameRunning) restartGame();
        });
        document.addEventListener('keyup', (e) => keys[e.key] = false);

        function drawRoad() {
            // Grass
            ctx.fillStyle = '#228b22';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Road
            ctx.fillStyle = '#333';
            ctx.fillRect(50, 0, 300, canvas.height);
            
            // Side lines
            ctx.fillStyle = '#fff';
            ctx.fillRect(50, 0, 5, canvas.height);
            ctx.fillRect(345, 0, 5, canvas.height);
        }

        function drawCar(x, y, width, height, color, isEnemy) {
            // Body
            ctx.fillStyle = color;
            ctx.fillRect(x, y, width, height);
            
            // Windows
            ctx.fillStyle = '#000';
            if (isEnemy) {
                ctx.fillRect(x + 5, y + 30, width - 10, 20);
            } else {
                ctx.fillRect(x + 5, y + 10, width - 10, 20);
            }
            
            // Wheels
            ctx.fillStyle = '#000';
            const wheelY1 = isEnemy ? y + height - 15 : y + 5;
            const wheelY2 = isEnemy ? y + height - 15 : y + height - 15;
            ctx.beginPath();
            ctx.arc(x + 8, wheelY1, 5, 0, Math.PI * 2);
            ctx.arc(x + width - 8, wheelY1, 5, 0, Math.PI * 2);
            ctx.arc(x + 8, wheelY2, 5, 0, Math.PI * 2);
            ctx.arc(x + width - 8, wheelY2, 5, 0, Math.PI * 2);
            ctx.fill();
            
            // Headlights (enemy only)
            if (isEnemy) {
                ctx.fillStyle = '#ff0';
                ctx.beginPath();
                ctx.arc(x + 8, y + height - 5, 4, 0, Math.PI * 2);
                ctx.arc(x + width - 8, y + height - 5, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function spawnEnemy() {
            const lanes = [80, 140, 200, 260];
            enemies.push({
                x: lanes[Math.floor(Math.random() * lanes.length)],
                y: -70,
                width: 40,
                height: 70,
                speed: 3 + Math.floor(score / 100),
                color: '#cc0000'
            });
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function update() {
            if (!gameRunning) return;

            // Player movement
            if ((keys['ArrowLeft'] || keys['a'] || keys['A']) && player.x > 60) {
                player.x -= player.speed;
            }
            if ((keys['ArrowRight'] || keys['d'] || keys['D']) && player.x < 300) {
                player.x += player.speed;
            }

            // Update road lines
            roadLines.forEach(line => {
                line.y += line.speed;
                if (line.y > canvas.height) line.y = -40;
            });

            // Spawn enemies
            enemySpawnTimer++;
            if (enemySpawnTimer >= enemySpawnDelay) {
                spawnEnemy();
                enemySpawnTimer = 0;
                if (enemySpawnDelay > 20) enemySpawnDelay--;
            }

            // Update enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].y += enemies[i].speed;

                // Collision check
                if (checkCollision(player, enemies[i])) {
                    gameOver();
                    return;
                }

                // Remove off-screen enemies
                if (enemies[i].y > canvas.height) {
                    enemies.splice(i, 1);
                    score += 10;
                    scoreDisplay.textContent = `Score: ${score}`;
                }
            }
        }

        function draw() {
            // Clear
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw road
            drawRoad();

            // Draw road lines
            ctx.fillStyle = '#fff';
            roadLines.forEach(line => {
                ctx.fillRect(line.x, line.y, line.width, line.height);
            });

            // Draw enemies
            enemies.forEach(enemy => {
                drawCar(enemy.x, enemy.y, enemy.width, enemy.height, enemy.color, true);
            });

            // Draw player
            drawCar(player.x, player.y, player.width, player.height, player.color, false);
        }

        function gameOver() {
            gameRunning = false;
            finalScoreDisplay.textContent = `Final Score: ${score}`;
            gameOverScreen.style.display = 'block';
        }

        function restartGame() {
            gameRunning = true;
            score = 0;
            enemySpawnTimer = 0;
            enemySpawnDelay = 60;
            enemies = [];
            player.x = 180;
            scoreDisplay.textContent = 'Score: 0';
            gameOverScreen.style.display = 'none';
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start game
        gameLoop();
    </script>
</body>
</html>
